<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Pilgrim's Road — Escape Vayne Keep</title>
  <meta name="description" content="An hour-long medieval castle escape room in your browser. Seven chambers, one hour until dawn, and a ghostly knight named Gus to help you." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>" />
  <link rel="stylesheet" href="../shared/css/main.css" />
  <link rel="stylesheet" href="../shared/css/animations.css" />
</head>
<body>
  <div id="app">

    <!-- ============ TITLE SCREEN ============ -->
    <section id="title-screen" class="screen">
      <div id="title-bg"></div>
      <div id="title-stars"></div>
      <div class="title-content">
        <p class="title-kicker">One hour until dawn</p>
        <h1 id="game-title">The Pilgrim's&nbsp;Road</h1>
        <p class="title-sub" id="game-tagline">Escape Vayne Keep before they hang you at first light.</p>
        <div class="title-buttons">
          <button class="btn btn-primary" id="btn-new-game">Begin the Escape</button>
          <button class="btn hidden" id="btn-continue">Continue</button>
          <button class="btn btn-ghost" id="btn-how">How to Play</button>
          <a class="btn btn-ghost" href="../" style="text-decoration:none;">&#8962; All Rooms</a>
        </div>
        <p class="title-foot">Seven chambers &middot; solvable but unforgiving &middot; best played with sound on</p>
      </div>
    </section>

    <!-- ============ GAME SCREEN ============ -->
    <section id="game-screen" class="screen hidden">
      <header id="hud">
        <div class="hud-left">
          <span id="room-badge"></span>
          <h2 id="room-title"></h2>
        </div>
        <div class="hud-center">
          <div id="timer" title="Time until dawn">60:00</div>
        </div>
        <div class="hud-right">
          <button class="hud-btn" id="btn-journal" title="Pilgrim's Journal — everything you've learned">
            <span class="hud-btn-icon">&#9998;</span> Journal
          </button>
          <button class="hud-btn" id="btn-sound" title="Toggle sound">
            <span class="hud-btn-icon" id="sound-icon">&#9834;</span>
          </button>
          <button class="hud-btn" id="btn-restart" title="Restart from the beginning">&#8635;</button>
          <a class="hud-btn" href="../" title="Back to room select" style="text-decoration:none;">&#8962;</a>
        </div>
      </header>

      <main id="stage">
        <div id="scene-wrap">
          <div id="scene" aria-label="castle scene"></div>
          <div id="hotspots"></div>
          <div id="embers" aria-hidden="true"></div>
          <div id="vignette" aria-hidden="true"></div>
          <div id="message-card" class="hidden">
            <p id="message-text"></p>
            <span id="message-more" aria-hidden="true">&#9660;</span>
          </div>
          <button id="gus-dock" title="Sir Gus — your companion. Stuck? Ask him." aria-label="Ask Gus for help"></button>
        </div>
      </main>

      <footer id="inventory">
        <span id="inv-label">Satchel</span>
        <div id="inv-slots"></div>
      </footer>
    </section>

    <!-- ============ OVERLAYS ============ -->
    <div id="modal-root"></div>
    <div id="fader"></div>
    <div id="fly-layer" aria-hidden="true"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
