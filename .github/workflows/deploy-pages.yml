name: Deploy to GitHub Pages

# GitHub Pages serves this repo under /Escape-Room/, so the build sets
# BASE_PATH=/Escape-Room/ (astro.config.mjs reads it; Vercel keeps the default '/').
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro (subpath base)
        uses: withastro/action@v3
        env:
          BASE_PATH: /Escape-Room/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
